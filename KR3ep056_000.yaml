body:
  text: 王震云先生診視脈案一王應震先生四十四字要訣理固潤澀通塞清揚逆從求責緩峻探兼候奪寒熱補瀉提越應驗滑澀大細促結舉按尋候逆順久新緩急清濁理資生萬物位坤宮惡濕喜溫益理中氣血源頭多此化先天化育損為宗固一點真陽寄坎宮固根鬚用味甘溫甘溫有益寒無補堪笑庸醫錯用功夫先天真一之氣藏於坎中其氣自下而上與後天胃氣相接而生乃人人之寶或因勞傷過度損竭其精以致精不能生氣氣不能生神使相火無有安宅妄動飛騰現出有餘之症實非有餘乃下元不足之氣故若用苦寒之味真氣愈虧而邪火易熾凡治此症惟當溫補於下而火自歸其位而病自愈矣潤肺為華蓋去皮毛金體由來畏火銷便燥皮枯津液涸滋營潤燥有功勞潤燥之功不出乎滋營潤燥流通氣血多因嗜欲無節致腎水受傷兩火浮越燥渴之疾生矣或前後祕結或痰在喉間乾咳此皆津液不足而火動元傷理宜補養腎中真陰使金水相生則升降出入濡潤宣通何病之有澀脾濕生痰滑泄腎虛氣弱多溏遺精不禁是行藏濕澀補方切當澀治之要不出乎溫補脾濕生痰宜補脾治在中腎虛失禁或溏泄或多溺或精泄宜補腎治在下如婦人崩漏脫而小腹作痛者此經信時不謹致血凝滯漸成瘕積故有血崩之患亦當驗血光察脈氣理應去其宿積此通因通用之法如崩不作痛者此虛之盛也大宜溫補切忌寒涼當用血脫益氣之法二者不可不察通痢疾瀉痛通用因驗色明分辨久新寒則當溫熱當下有餘不足妙如神通治之法不出瀉痢二端若暴痢後重窘迫而疼連去無度則滯有不行或身熱色赤此等宜下如有不疼而瀉亦屬積也其瀉者旁流而下若用澀止藥愈深愈疼此等亦宜下之俱有通因通用之法若痢久紅白不止身冷脈弱去雖無度其腹微疼切忌寒涼之劑急用附子理中溫補為主此屬氣不能攝血而統於諸經也若瀉久色如鴨溏亦宜理中溫補為要古云諸積諸疼喜溫而惡寒誠不謬矣塞塞因之法難傳疏啓中間峻補兼此理若能知得透孰云醫道不通仙塞治之法甚是駭人耳目且氣脹無治法人皆懼之殊不知下氣虛乏致中焦滯實蓋腎乃生氣之源若先天氣乏焉能與後天胃氣相接而喘脹之症生故胸脅滿甚不若峻補於下疏啓於中此王太僕之微言且用補之法少脹則資壅多脹則宣通下虛自實中滿自除此塞因塞用之法也粗疏者不足以語此清清肺甘寒味最良水金滋養此源長若加辛燥純涼劑多使真元氣自傷肺為五臟華蓋而統攝諸氣運行不息乃至清之分所畏者火之上逼耳一或有傷痰因火動中焦之氣必傷而咳嗽吐痰吐血且肺受火制失其乾健之能在變生百病藥宜甘寒滋養使子母相生不受火制其氣自清矣若用辛燥純涼之品反傷真氣更當察脈之虛實脈如不足雖有痰血亦當溫補真元揚外感風寒發嗽身多寒熱頭痛或兼火鬱在諸經發熱發輕揚此定外感天時不正之氣內因飲食失節防礙真氣變生諸疾惟輕揚疏氣一法應手而愈逆人火分明勢緩然寒涼風伏藥相兼兩須辨莫使差訛至倒顛經云微者逆之人火者心火也其勢緩可以水滅直折黃連之屬治也從龍火飛騰太速遇寒光焰滔天惟其催折勢難兼邪退正隨管見經云甚者從之龍火者相火也其勢速不可以水直折勢當從其性而伏之惟桂附之屬可治也求嘔逆聲頻氣有餘欲餐難入費躊躇熱因寒用無他技薑製梔連倍竹茹責寒動於中本腎虛腎虛陽脫氣難拘惟其地戶應勞閉失禁終須喪厥軀經云虛者責之腎虛則寒動乎中又真陽脫而瀉者則不禁門戶矣脈存者生脈脫者死宜峻補於下緩則不能斡旋矣緩久而增氣理悠長緩滯中和物化常脾胃相宜惟谷菜藥偏勝不為良皆經云久而增氣物化之常氣增而久夭之由夫胃者清純沖和之氣惟於谷藥相宜即參朮亦有偏勝況寒苦辛熱之藥乎要在察其病新緩急當重劑治之病勢緩以輕劑調之苟或邪氣已退而正氣未復藥宜間服加以飲食調之緩急之道不可不知若過於藥反傷中氣則病愈綿延不休醫者當臨機應變庶無偏勝之患峻勢急難施緩治實虛劑童當為理中承氣斡旋分用著驗如神應探初驗難分真僞欲施攻補狐疑全憑調探虛實此為醫家上計實能受寒虛能受熱兼實虛相挾損元陽攻補兼施用酌量先理脾家為切效氣行無礙補無妨兼治之法攻補並行倘為飲食所傷致傷脾胃或吐瀉或胸脅脹痛或怒氣挾食傷肝皆損中氣雖勞傷等症頭痛發熱務先調理脾胃宜溫補加理氣之品使脾氣運行諸症平復再授純補之藥設有微邪自然汗解而愈古云物滯氣傷補益兼行消導此之謂也候傷寒表實汗為難火數如逢發等閒歷代明醫無此訣於今識破妙機關外感有餘之象必身熱頭痛惡寒無汗乃邪郁腠理表實之故若發汗發不出不宜強其汗候逢火數必發戰汗出亦有不戰而汗者若戰汗時宜溫補以助要使正勝其邪自然汗出而愈如數未至強發其汗反傷真氣其病愈甚此心得之妙奪臨症隨機見識高宜攻宜守在分毫心存專主人司命急奪乾坤造化標寒惡寒戰栗非寒症陽元陰微濟熱深莫使差毫謬千里也須著意箇中尋真寒之症宜大劑溫之熱極甚而反惡寒者脈必有力症有別宜承氣下之熱惡熱應非熱元虛氣自傷莫教從實治須用補虛方真熱之症其脈洪大有力身熱譫語大便閉結煩渴欲飲得水不逆此當急下無疑如陰虛發熱而渴者須生熟地等藥治之補陰盛陽衰氣薄便溫惡冷通情醫能識破箇中情起死回生有應瀉實病恆有汗下宣脈應對症法當權若將忽略輕生命訣有言傳出自然提氣虛下陷因何故勞損傷神理必然祕說兩般無所據全憑提固法當高中虛者胃氣下虛者腎氣先天后天二氣相接氣血流通運行不息何病之有一或有傷病則生矣致使肝腎之陰不能生心肺之陽不能降上下不利正當用提固之法如效更當用溫補真陽其氣自然通達如婦人血脫虛寒帶濁並宜峻補兼提並治下氣虛脫泄瀉等症經云出入廢則神機化滅升降息則氣立孤危而化化生生亦由此一氣耳越食塞胃中氣不調越因越用法為高食如嘔出因無火溫補中宮積自消應治法中間有四應四應之處可回生汗溫吐下應無失失卻相應命必傾驗醫家臨症要分明察色觀神識死生腹滿按之虛與實還憑驗舌聽聲音諸病之端先難形氣次察聲色經云色之與脈當相參驗但五色有四季之分惟土位居中央四季兼有五色之中稍帶微黃方為佳兆不可純見故脈中兼緩色中兼黃為有胃氣皆不至死舌乃脾之絡心之苗鮮紅者屬熱白胎而乾者亦屬熱白胎而滑者寒也色紫者火熱亢極也黑者熱極反兼水化少有生意危之兆也色黃兼利而唇口碎烈非實熱乃假熱也此腎水枯竭不能生化津液宜大劑溫補若用寒涼反瀉真陽其死必矣滑往來流利各為滑緩大相兼氣必傷莫作痰看依古訣當求陽分謗推詳澀沾沙刮竹一般看滑澀當分滯利間莫作氣鬱痰血積元精久病必傷殘澀者遲難為少血亡汗傷精氣鬱大脈大當知病進氣虛邪盛同行要分濁細推情實瀉虛溫驗症肝脈腎脈心脈小急不鼓為瘕細細如一縷是元虛若帶沉弦積有餘當辨久新求責治依經據理莫差遲細數真陰虛細遲真陽虛促身熱脈來歇止數中越促非祥若還漸退病無妨愈進料應多喪結脈遲帶結七情傷歇至中間細忖量痰血滯經多此候當分新久實虛方舉輕循之法名曰舉浮脈中間仔細看有力有風兼表實無神無力是虛端按重取之法名曰按按之不足是虛元有力為痰多氣滯宜溫宜下細推之尋不輕不重曲求尋個理機關理最深生死實虛從此得粗工豈辨石和珍候四時當旺何為重要識強洪沉與毛一字同情分兩意診值節氣乃為高逆陽病見陰名為逆形羸脈大亦皆然有餘不足如相反決死無疑命在天順脈大形標兩得平證餘脈大重還輕形羸脈細無妨礙脈症相符是順情新暴病玄機在右關右關神在豈傷殘更將脈理來參考莫把斯言作等閒久宿病根源在絳宮絳宮流利勢從容若還肉脫難同例久候雖調命亦空緩迢迢胃氣喜從容旺在中和四季中虛實補消分兩法若無胃氣總成空胃氣之脈弱以滑和而緩似有力而不堅徑也虛不受補實不受消皆胃氣有虧危之兆也急火盛脈虛脈急有餘不足交加醫能分辨藥無差正復緩來邪罷清清脈無邪氣自傷藥宜溫補是良方病從內出無他故訣有言傳識見長清者無力屬虛濁脈濁邪平氣有餘應加疏泄莫躊躇病因外入無他故得訣回來好看書濁者有力屬實以上四十四字乃王應震先生祕傳醫中之精髓明足以察秋毫之末朝夕玩索自能得之於心而應之於手古云不為良相即為良醫非醫博不足以當此言耳二王應震先生示子孫慎醫歌良相功名在濟民良醫施藥亦同情陰陽理氣須融徹才能道術貫天人背謬醫書休浪讀內經奧旨細推尋理會各家知採擇儒醫名義不虛稱博聞多識能歸約自然詳審盡其因效法古方毋固執常變相臨辨要真果能造到逢源地信手拈來總是春三望聞問切望而知之者謂之神望其五色以知其病也聞而知之者謂之聖聞其五音以知其病也問而知之者謂之工問其五味以知其病也切而知之者謂之巧切其脈證以察其病也四四大家外感法張仲景也內傷法李東垣也熱病法劉河間也雜病法朱丹溪也五辨寒熱虛實損脈法必要寒症脈法脈遲緊伏三部皆同按之緊直如琴絃若四至以上為寒邪宜辛溫發散四至以下是真寒宜姜附之類以溫之又云脈緊或微遲大便溏瀉有汗乃真寒之症雖發熱好茶水不可輕用涼藥宜大劑補之又宜溫熱藥滲利之其瀉自止其熱自退熱症脈法脈按至骨不動為真火症若便祕宜下外病脈洪數為邪熱宜清涼發散緊數而浮者宜散沉數者宜下虛症實症脈法脈舉按形大空虛而軟無火之人細數而軟有火之人脈至兼數數然細數浮數弦數俱屬虛火大宜滋補若洪數沉數有力此屬實火宜清散降瀉間有虛火脈狀渾如蔥管一般粗又云陽虛多遲陰虛必數虛損辨症與脈法脈細而浮是氣虛也脈大而浮是血虛也自汗不止惡寒盜汗是氣虛也晡熱內熱發熱不寐是血虛也發熱煩躁肉瞤筋惕是氣血兩虛遍身皆麻神思倦怠晡熱作渴自汗盜汗亦氣血俱虛筋攣臂軟肌肉掣動此元氣下陷也肚腹喜暖口忌冷物此形氣病氣不足也飲食勞倦起居失宜面赤嘔吐畏見風寒此內真寒而外假熱也兩足痿軟日晡發熱胸膈不利飲食善消面帶紅色大便祕結是三陰虛也胸腹作脹飲食少思是三陽虛也胸腹脹滿寒出如雨四肢逆冷睡中驚悸覺上升如浮下陷如墜脈洪大而數重按微細此乃屬無火虛之極也遺精白濁自汗盜汗內熱晡熱口乾作渴喉痛口裂胸乳脅脹痛頭頂或痛眩暈目花心神不寧寤而不寐小便赤澀莖中作痛此屬無根虛火為患也傷寒賦欲治傷寒先須識症識症定名處方必應且如太陽有傷營傷衛之分陽明有在經在腑之別少陽在半表半裡之界但主乎中故曰膽為清淨之府至三陰有傳經之不常須究脈理而推詳傳經者脈急數而煩熱真中者脈沉細而清涼當汗而下為結胸痞氣當下而汗為厥竭元陽腸垢鶩溏須辨脅寒脅熱瘀血蓄血可知發狂發黃癮癥斑爛發於濕熱二症肉瞤筋惕起於汗下兩傷若失風濕則喘息多眠濕溫則妄言不食風濕肢體重而額汗流中濕肌膚黃而小便澀陽毒則面赤而斑狂陰毒則唇青而厥逆發汗戰汗身涼者喜水火既濟之功合病並病下利者俱木火互相為克又聞實者為譫語虛作鄭聲水飲停蓄者或嘔或噦火邪劫奪者或狂或驚喘咳者水搏寒之所致吐衄者熱逼血而妄行單杖雙伏此非怪脈乃否極泰來之兆陽易陰易皆為危證引男女交接之情惡寒喘嗽者發表自愈惡熱喘滿者攻裡必寧咳逆又名乞忒動悸更曰怔忡雙傳者雙經同病百合者百脈一宗懊因心中之鬱悶奔豚自臍下之攻忡腑痛引陰名為臟結厥利反食號為除中瘛瘲者手足抽搐怫鬱者頭面蒸紅勞食再復因新差之犯禁過經不解與溫瘧而相同蓋傷寒傳變之不一非雜症逢真而可攻豫茲略陳其要學者自當變通六湯論治傷寒和營透表解肌湯此桂枝湯之脫化方也當歸桂枝秦艽炙草陳皮防風神麯生薑身痛無汗畏寒甚頭目痛肢節皆痛加羌活如出汗加炒白芍減羌活防風如系出冷汗加附子茯苓如氣虛者加白朮如氣滯嘔惡者加藿香砂仁如痰多泄瀉者加白朮半夏茯苓去當歸如兼陽明症加葛根白芷如兼少陽經症加柴胡以上出入加減總要憑脈虛實在表在裡審症虛實宜攻宜補或外感挾內傷症或內傷重挾外感症斟酌淺深機變增減無不中肯綮矣清解風熱保肺湯桔梗薄荷前胡杏仁甘草枳殼貝母姜蠶防風沙參牛蒡子透發痧疹邪毒湯防風荊芥桔梗前胡葛根甘草赤芍連翹升麻蟬衣牛蒡子如口渴目赤內熱唇燥舌苔加石膏生地如體虛不甚者去赤芍升麻加沙參如挾有寒濕者方法又當別論不同拘泥潤養脾陰湯山藥茯苓沙參扁豆陳皮石斛白芍炙草柏子仁補火生土湯白朮茯苓黑姜陳皮米仁人參炙草補骨脂菟絲餅七診視脈案方法培養精氣充足精生於氣氣化於精陰陽互根坎離妙用是以人之精氣充足則寒暑不入道書言精氣神為內三寶耳目鼻為外三寶人能潛視返聽蓄養精神則可以煉神還虛養生者豈可舍此根蒂而求見枝葉之末有何益哉脈細軟熟地四兩枸杞一兩五錢澤瀉八錢丹皮一兩山藥二兩茯苓一兩人參二兩鹿霜一兩五錢炙黃耆一兩五錢山萸肉一兩五錢菟絲餅一兩五錢補骨脂一兩遵雷公制末為丸嘔惡作瀉畏寒先天之本在腎命後天之本在脾胃然有形精血亦賴後天穀氣生化是以四時脈皆以胃氣為主今診脈參伍不調兩關絃動證則嘔惡子夜作瀉身倦畏寒中氣不舒等候總由脾腎交虧不能蒸糟粕化精微也節屆冬至倍加保護為主焦術茯苓菟絲餅炮姜川椒陳皮人參補骨脂嗽喘傷肺腎經云五臟皆令人咳非獨肺也然久嗽兼喘亦無有不關乎肺腎兩臟且腎為氣之根源肺為氣之統帥水出高源自有以也時當秋令脈見浮數皆屬虛火所致治宜清金納氣歸腎足為斯症綱領熟地茯苓北五味山藥沙參白芍石斛菟絲餅麥冬枸杞阿膠腎虧耳聾頭眩脈象弦數之至肝腎大虧自有耳聾頭眩氣怯等候宜返觀靜養佐以藥力庶可杜其履霜堅決之虞如視為泛泛必至臨渴掘井猶恐不及事也熟地枸杞山藥山萸茯苓丹皮澤瀉石斛龜板菟絲餅風寒食滯口渴風寒傷於營衛閉郁皮肉陽氣不能疏暢自見發熱之症飲食滯於中焦津液不運自見口渴之候皆非火也溫散導滯自可霍然初起失於溫散每至纏綿不解傳變他症防風秦艽桂枝杏仁砂仁陳皮神麯生薑腎虧腎為先天之本又為作強之官故人之強弱勇怯無不關乎天稟之初善調攝者能悟知雄守雌蓄陰養陽之理亦可補先天之不足熟地山藥菟絲餅山萸澤瀉鹿角人參甘枸杞後天脾土虧弱經云中焦受氣取汁變化而赤是為血可見日之生化全賴後天脾土今病已久中土虧敗不能傳送藥力神氣日見消剝最為病家之忌人參焦術茯苓陳皮炙黃耆炙草當歸益智南桂風寒痰嗽化熱病因起於風寒有失於疏散邪氣乘虛內伏致令內熱痰嗽口乾腑中不利頭眩背痛雖經日久病本未除還當治本庶免傳為虛候慎之橘紅半夏炙草桔梗茯苓前胡姜蠶秦艽杏仁玉竹生薑羌活肝風頭搖瘛瘲肝主通身之筋因風熱內熾則筋脈不柔而頭搖瘛瘲之病作矣幸神志不傷語言如常病在筋脈治宜清肝熱散肝風風熱去則筋自柔庶可望止但此症恐成痼疾速當早為除根脈浮而數當歸天麻鉤藤姜蠶白芍茯神遠志香附赤芍白芷金器咳嗽泄瀉腰痛本質雖因目病攻擊過度氣血不無被傷又兼怫鬱以致失血已經調理妥適矣無煩再議現在咳嗽發熱口渴引飲泄瀉腰痛頭眩脈亦緊數確有陽明新冒外因所召若作舊病理治恐難中肯羌活葛根甘草杏仁白芷桔梗前胡當歸秦艽川芎生薑腎虧火亢焦燥兩手脈皆澀而帶數症則焦燥不寧飲食微少壯年非所宜也此必因勞思抑鬱搖精耗神致令水虧火亢變現諸病若不早為見機保護誠恐履冰堅霜之至矣毋忽之熟地山藥麥冬人參山萸枸杞丹皮澤瀉石斛龜板菟絲子遵雷公制末為丸脾腎大虛火不生土脈症不虛急宜重補方克有濟所謂峻補於下疏啓於中此遵先哲塞因塞用之法也如或畏懼生疑仍然治以利器之品猶恐根荄愈傷致蹈虛虛之候熟地茯苓山藥山萸澤瀉丹皮附子肉桂車前牛膝人參菟絲胃熱嗽血左脈平順無恙右脈略覺燥動素多胃熱可徵偶然痰嗽見血胃火觸動肺金也不宜作陰虛陽亢虛損調理麥冬花粉川貝梔子甘草丹皮瓜蔞葛根荊芥石膏熟久嗽傷肺失血按脈兩手皆弦傷血所以動血然不數不燥諒不至成真病據症吐血有時發作或由內傷外感不一咳而兼痰纍久不休非可全藉醫藥救療惟有靜坐養神少勞心少費神少動怒恬淡從容時時保衛自然氣血安和血不期止而自止咳不期愈而自愈矣萬勿以意服藥寒熱涼散不時常試究竟無效徒呷苦水何如擯除一切以善養之為得乎管見如斯高明自裁藕雄豬胱雪梨西瓜腳魚緑豆凡同類於此症者皆可常吃調元養氣經云飲食自倍腸胃乃傷此症之所由起也日復一日屢服消導之劑雖所快於一時而胃氣重傷脈皆短細兩尺尤甚將有纍及其腎之象及早圖之庶不流為食㑊熟地山藥茯苓丹皮焦術山萸杜仲補骨人參肉桂木香正氣大虛形色脈症無不是虛之象不可以意猜摸自認為氣為滯若誤作實治誠恐正氣日剝蹈入虛虛之象遷延日久挽回非易毫釐千里之謬幸毋忽之附方請教高明政之人參黃耆焦術熟地白芍當歸遠志炙草陳皮茯苓五味肉桂生薑大棗百合病年甫四十脈則弦多胃少諸症直如蝟毛先哲所謂百合病也宜以輕鬆之劑緩緩調理或可冀其奏功百合沙參石斛炙草橘紅茯苓山藥女貞安胎脈息滑利確屬有喜急以固之慮其勿易熟地白芍當歸川芎焦術炙草茯苓艾葉糯米紵麻怒傷肝鬱吐血而嗽病因鬱怒傷肝既血逆上而為吐橫侮肺金而為嗽血去則陰虛陰虛生內熱按脈細而急肝肺陰虧之象難免不損治宜養陰平木保肺清金之品投之再看轉機熟地生地元參川貝桔梗炙草麥冬白芍當歸百合元虧將脫六脈浮大無根此真元大虧刻刻防脫勉擬一方以盡人事可也急當多請高明參酌再用人參焦術茯苓炙草陳皮麥冬五味火衰土敗尊恙總因命門真火不旺未能熏蒸脾土故胸痛徹背進食維艱防成里關外膈之症只有八味一方補火生土庶可奏功再聽酌服熟地山藥山萸澤瀉丹皮茯苓附子肉桂陰竭抽搐年及七有七矣天癸應期不斷非有餘也偶一及之蓋勉力之為耳常苦頭筋抽搐肝腎真陰欲盡一點微陽上竄瞽之微驗無疑設能發白庶可免煎劑養心生血以歸脾自可吻合病情熟地山萸茯苓山藥丹皮澤瀉附子牛膝肉桂鉛錫兩手脈細碎無神真陰虧竭極矣頭風貫目而瞽乃為佳兆否則孤陽貫頂則無能為力矣仍以前方加龜板秋石再服二劑經衍虛熱色淡腰痛脈細急少力三陰虛熱且經不應期體痛色淡法當養營調之當歸料豆丹皮茯苓菟絲餅丹參杜仲山藥續斷蓮子云間程氏紹南先生醫案腎虧勞淋松江吳姓患淋症半載余初莖中痛甚後微癢服清熱利水之劑勢欲轉劇延師診視脈得空軟兩尺微數左寸短小此腎水素虧勞心太過所致師以勞淋治之方擬補中益氣加五汁治之蓋腎為藏精之府而實聽命於心思慮不節嗜欲過度遂至水火不交陰陽乖舛清濁相干以成淋症徒事清熱利水則氣愈陷精愈脫溺愈澀矣惟治補中益氣使陰火不致下溜清陽得以上升所謂病在下取之上也然但知升清而無以降濁猶未盡善觀五汁之加立法神奇然誠有不可思議者矣真人參四錢綿黃耆一錢五分軟柴胡三分煨升麻三分白朮炭一錢當歸身一錢廣陳皮一錢提麥冬二錢淡川柏鹽水炒一錢甘草梢五分肥知母鹽水炒一錢五分加蘆根汁生梨汁白果汁甘蔗汁茅根汁池藕汁亦可各汁二杯沖服脅痛吐酸一婦患左脅痛吐酸乃惱怒傷肝木旺土虧之症擬以柔肝調氣法未識有合病情否真川連三分淡吳萸三分法半夏薑製一錢雲茯苓二錢廣陳皮一錢五分生白芍一錢五分小青皮炒一錢制香附二錢川鬱金一錢石決明煅四錢加川楝子炒一錢玫瑰花三朵氣血兩虛足指麻痛娘娘手足指時麻時痛乃氣血兩虛之症並年近五旬天癸時下擬以養營益氣調經舒絡治之當歸全一錢五分炙綿耆一錢左秦艽一錢天烏藥一錢奎白芍二錢白朮炭一錢五分原生地三錢金香附二錢五加皮二錢加酒炒桑枝四錢片薑黃五分怯症爛喉痹平湖許慶陵患怯症四肢倦怠面色萎黃納穀甚少潮熱咳嗽咽喉赤爛診之六脈細軟兩尺微數此上實下虛之候蓋水火合注則陰陽平祕真水不足則虛火上炎幸兩尺雖數而未浮因早服丸方以救肝腎之不足晚服膏方以培脾而保肺所謂資其化源也再用吹藥以治喉爛乃急則治標之一法也清晨丸方大熟地四兩五味子五錢懷山藥二兩提麥冬五錢白茯苓一兩五錢湖丹皮五錢人中白五錢龜板膠六錢西砂仁五錢坎干二條甘草水淨烘脆研共末用豬脊髓蒸熟打和作丸建蓮湯送下五錢晚服膏方北沙參三兩生苡仁四兩提麥冬一兩五錢金石斛三兩原生地四兩京川貝五錢陳阿膠二兩嫩百部二兩款冬花二兩甘枸杞五錢雲茯苓一兩五錢河水煎膏去渣加血燕屑一兩煎收厚開水化服一兩吹藥方人中白三錢兒茶二分青黛一錢牛黃一分真珠五分燈草灰一分月石二分生龍骨一分共研細吹之喉癰一人患喉癰之後日夜吐痰數碗食入即吐六脈弦硬真人參福花橘紅李仁煅赭石冬瓜子法夏珠母阿膠加竹瀝梨汁蘆汁各三匙薑汁一匙頑痰多語多言攣踡一人手足攣踡時多言語此頑痰聚於心胞由痰生熱由熱生風之所致擬用鉤藤羚羊角湯治之純鉤藤羚角山梔橘紅大熟地赤茯苓金沸草天麻竺黃生石決生甘草加竹茹兩足痿軟一人督任為病其氣自背環前上衝胸腹飲食不下兩足痿軟治之補腎為主起痿真人參熟地蓯蓉韭子芡實甘枸杞五味菟絲萸肉杜仲鹿角膠河車茯神山藥坎氣加人乳一杯沖服肛痛腸紅浦東沈作霖六月中旬患肛門而痛糞後便紅此炎暑之後君相之火亢甚鬱熱於血分經絡之血滲入大腸所致擬清上滋下法懷生地京元參槐角炭肥知母提麥冬烏犀角炒山梔地榆炭荊芥炭丹皮炭加荷葉六一散感冒暑邪作渴一人感冒暑邪晝夜發熱口中作渴小便黃赤治以清暑化熱生津一法陳香薷麥冬知母川連花粉淡黃芩翹心青蒿赤苓梗通加六一散枇杷葉茅根暑氣挾寒疼痛泄瀉一人暑氣挾寒少腹疼痛大便泄瀉陳香薷會皮廣藿赤苓木瓜紫川朴澤瀉豬苓扁豆車前加六一散佩蘭喉癢咳嗆痰帶黑塊一人患喉癢咳嗆痰中兼帶黑塊此陰虛火亢之症原生地丹皮天冬麥冬百部料豆衣元參龜板甘草中白癇症一童女癇症每月一二次厥時必四肢逆冷口吐涎沫明天麻姜蠶赤苓法夏竹黃陳膽星川郁鉤藤枳殼橘紅生石決蔞全加鮮石菖蒲咳嗽浮腫一人患咳嗽遂至頭面遍身浮腫發熱大小便不利此因感冒暑風邪入肺胃高原水竭不得灌溉下焦以致二便不利肺氣不化以致遍身浮腫擬用枇杷葉散陳香薷赤苓皮宣木瓜新會皮廣藿梗杜車前桑白皮瓜蔞仁加枇杷葉冬瓜皮茅根漂滑石咳嗽吐血一僧咳嗽吐血六脈細數乃為火旺爍金咳傷陽絡血隨外溢擬以清金涼血法原生地元參丹參山梔淮藥京川貝茶花丹皮茜根知母蔞皮加鮮茅根寒熱咳嗽吐紅一人吐紅之後往來寒熱咳嗽軟柴胡鱉血水炒首烏黃芩知母青蒿京川貝歸身橘紅白芍鱉甲溺血一少年初起便精續得溺血原生地麥冬赤神丹參山梔人中白阿膠小薊茅根金沙風寒痰喘一人風寒入於肺絡郁久成熱凝滯膈膜之間以致痰喘不寧細審脈象尚弦滑雖兩尺空軟而上焦之風熱未清宜輕緩湧越之法先治其標後治其本冬瓜仁川貝山梔杏仁橘紅料豆衣桑皮款冬鉤藤炙草粉前胡白芥子葶藶法夏肝疝兩脅作痛一人患肝疝少腹之氣上衝兩脅而痛荔子核蔞皮川楝橘核柏皮五靈脂延胡青皮小茴橘葉瘧疾一人年已古稀時患瘧疾或一二日發或三日發此少陽厥陰病也軟柴胡鱉血炒人參會皮法夏川連制首烏白芍桂枝炒川貝豬苓鱉甲粉歸全青蒿料衣風痰卒倒一人風痰入於肝絡時時卒倒羚羊角鉤藤橘紅法夏殭蠶刺白蒺天麻枳殼川郁草梢天竺黃竹瀝五匙薑汁一匙白芥子菖蒲氣喘痰火一人咳嗽氣喘此風入肺底經絡阻塞痰火已成炒山梔淡豉桑葉款冬蘇子冬瓜子川貝橘紅銀杏兩足無力李中翁六脈弦硬此年高氣血兩虛津液不得灌溉下焦以致兩足無力宜慎勞節養少飲醇醪不致釀出虛痿也擬以健中補腎為主花仁霜料豆衣菟絲子川杜仲川續斷肥玉竹黑芝麻淡蓯蓉肥氣作痛一人患肥氣攻衝作痛前服平肝藥得以稍安今又胸膈不和此肝脾之氣不舒俟肝氣一平胃氣健旺腹自舒矣川楝子橘核烏藥靈脂吳萸韭菜子青皮白芍生薑接服生石決會皮法夏白芍香附大腹絨烏藥金斛鉤藤淋症高橋蔡患淋症莖中作痛陽強不痿人參石蓮麥冬川柏知母桔梗沙參生地甘草加甘蔗汁茅根汁白果汁丸方人中白川黃柏血餘炭豬脊髓蒸熟為丸産後蓐勞杜行張連吉令媳小産後潮熱不解自汗泄瀉干嗆無痰納穀不下細審六脈大而無倫左關尤甚此氣血俱傷陰陽並虧之候蓐勞之象履霜已兆速宜調理真人參新會云神芡實丹參酸棗仁白芍肉桂炒炙草穀芽加砂仁浮小麥服前藥三劑後諸症安然白淫不止於前方去穀芽浮小麥加蓮鬚麥冬牡蠣五味血溢烘熱潘仁杰令郎脈帶芤澀時有烘熱防其血載火血溢須戒房幃惱怒醇酒厚味之物懷生地麥冬元參川斛湖丹肥知母赤苓甘草人中白時邪類瘧嘉定吳鑑明先生感冒時邪三經不解六脈浮緊四肢厥冷頭汗稍出至頸而還少腹微滿日夜寒熱往來兩次舌胎白厚此為陽微結既有表而復有里也用小柴胡湯合厚朴杏仁先散其表裡之邪再商調治軟柴胡黃芩法夏川朴杏仁草豆蔻會皮桂枝甘草生薑服前藥二劑寒熱如故但頭汗止兩足稍有微汗脈少斂前方去草蔻又服前方一劑寒熱少減偶爾紅痰乃熱傷陰分所致軟柴胡鱉血炒黃芩炒白芍桂枝炒首烏歸身炙鱉甲會皮炙草川貝湖丹積瘀吐血崑山沈如舟失血之後兩關芤澀此肝胃受傷火載血溢據述喜飲醇醪則平素之傷於經絡可知刻下雖有氣急時嗆之象緣積瘀未楚尚阻礙升降之道路愚意當早晚分治補瀉並行不致由淺入深由腑入臟耳真人參丹參苡仁茯苓丹皮茜草根懷膝小薊犀角童便晚服丸方西血珀懷膝人中白血餘灰側柏葉赤丹參大黃韭菜制共末煉蜜為丸每服一錢藕節湯送下二閉便結陰虛痿弱婁東王商言令弟去冬兩足麻軟抽掣胸腹日晡潮熱夜多盜汗少腹有塊攻衝關元時時作楚漸至二便祕結服滋腎得效刻下二便雖通總不如前細按脈象兩尺直上直下弦緊無神此精竭血枯之象經云北方黑色入通於腎開竅於二陰又云津液盛則二便如常若精血耗竭則二便閉此督任為病明有驗矣況平素中氣不足並患血風瘡多年今又汗出過多頻服利水津液枯竭而大便努責不出肺耗金燥不能施化州都合而言之總由腎臟不充惟宜滋養真陰兼資氣化不致釀成虛痿之疾若以疏泄利氣皆為戈戟之劑可不慎歟綿花仁料豆衣雲茯苓郁李仁懷山藥制首烏元武版陳阿膠真血珀上沉香共為末用豬脊髓蒸熟為丸清晨開水送下午後服麻杏湯黑芝麻杏霜共末開水調服小便祕結方紫菀茸冬瓜子提麥冬毫桔梗甘草梢白果肉滋腎丸黃柏知母肉桂共研末以豬脊髓蒸熟和丸服至小便利即止流痹咽痛聲啞王商言夫人久患流痹服潛行散而減去冬忽咽痛聲啞服清肺降氣之劑得效刻下聲尚未清肌膚皺揭面浮而無潤澤六脈尚弦緊有力右三部尤甚況向來血液里耗心虛邪湊釀成流痹痹雖漸減但濕去燥存或觸惱怒或任勞力壯火橫乘淫熱反克以致手足無力音啞咳嗆此皆陰血不足火熱所傷也治宜甘寒滋腎潤甘能生血寒能勝熱陰得滋而火熄液得潤而燥除自然金能生水水亦能生金矣原生地黃柏知母龜板阿膠人中白旱蓮百部元參珠母羚羊角共為末煉蜜為丸清晨開水送下煎方黑元參知母川斛川貝羚角新會皮梗通山梔鉤藤燈心厥逆作痛太倉錢國表夫人厥逆作痛兩次細審六脈沉滯據述每痛必由大腹腸燥結漸至左脅作楚服左金等劑則痛止但痛緩則天癸必至是症因平素鬱怒傷肝肝氣不得條達今適少陽厥陰司天在泉之歲其臟腑正不足之候木鬱縱橫乘金則上逆作嘔乘土則脾胃燥結服平肝左金之後則肝氣下注於衝任之脈所以天癸每痛止而即來此肝脾兩虧之候明有驗矣管見以甘寒鹹寒滋養腎陰候其水能生木不致血虛火燥致成結腸反胃若左金全福代赭諸劑此急則治其標之法也金石斛赤丹參黑元參肥知母雲茯苓廣陳皮制香附郁李仁制首烏加竹茹丸方原生地石決白芍歸身香附黑山梔阿膠人中白丹皮旱蓮紅漏嶽王舟受全甥女童年漏經此先後天不足肝脾之不統接可知皆君相之火相煽肝風下注血海不能納血錯經妄行經旬纍月漏下不止服補氣接復之法雖得暫停一二日後仍淋漓不斷至眩暈厥逆牽引奇經之抽掣作楚三焦大虛不能統制以致虛症蜂起精神倦怠總由肝血大虧脾陽下陷尾閭不禁滄海欲竭之象急宜並補陰陽庶有斡旋造化之功真人參於術炭雲茯苓淨蓮鬚芡實肉奎白芍煅牡蠣廣陳皮煅龍齒嫩白薇加金櫻子膏丸方嫩鹿茸坎氣人參蓮蕊於術元武版白芍生地阿膠血餘自汗盜汗婁江蔣和九自汗盜汗心陽不接也納穀不化神氣倦怠火衰於下脾陽不振也舌光無味夜不得寐心腎不交也細審六脈沉緊弦硬乃精枯血竭之象也擬兩儀合虎骨膠鹿茸異類有情之物填補庶幾有效別直參河車膠鹿茸膠虎骨膠熟地膠人乳粉酒濕傷絡頭痛太倉錢國卿醇醉醪過飲濕熱傷於胃絡以致上衝巔頂眩暈頭痛細審脈象滑大而芤每酒後右關微見歇止當以清胃勝濕之法不致火載血溢川石斛葛花枳椇山梔茯苓緑豆衣鉤藤茵陳六曲甘菊丸方紅白首烏柏皮沙蒺葛米葛粉西茵陳枳椇泛丸緑豆衣湯送下天癸不通成瘕一婦人天癸經年不通少腹有塊攻衝作痛以致胸隔滿悶四肢頭面浮腫兩足寒冷飲食時時嘔吐此係經水適來誤服寒冷以致寒客下焦血凝不運經云惡血當下不下衃以留止日以益大月事不以時下而成瘕聚是攻衝作痛陰血凝結於下濁陰上干清道乃致胸前滿悶時時嘔吐清陽不能下通兩足豈有不寒冷者乎然血凝已久水道亦為之阻塞水氣侵澄所以浮腫而按之如泥也所謂先經斷而後至腫乃是血分為病治法宗內經結者散之寒者溫之今後擬行血理氣之品調治再以調經丸治其本也紫丹參金香附臺烏藥炮薑炭五靈脂茺蔚子延胡索新會皮澤蘭葉砂仁末川鬱金煅瓦楞時瘧周浦姚嶽亭令郎時瘧四十餘日不解六脈空軟無神面青唇紫陽縮舌胎白滑此平素肝腎不足時邪盤踞厥陰之表少陽之裡不解而然也當以三甲之意掣散其兩經之伏邪再商調補軟柴胡原生地粉歸身左秦艽廣陳皮京川貝肥知母宣青蒿奎白芍元武板生鱉甲制姜蠶煨葛根料豆衣痞滿作脹便清孫佑修久郁不舒肝脾氣結清濁混於中焦胸膈痞滿作脹闌門之氣不利大便旁流清水小便時通時阻經云清陽在下則生飧泄濁陰在上則生䐜脹又少陽為樞樞機不利肝氣橫行決沖因多變幻諸症細審六脈左三部沉細而軟重按無神右三部庶幾稍舒口舌糜爛赤紫兩足時有冷狀此係病久陰虧兼之君相之火亢炎擬固本湯以清晨服晚進滋腎丸導火下行使其口糜舌腫即退然後再商調理炒生地提麥冬淡天冬黑元參湖丹皮奎白芍炒枸杞甘草梢赤茯神加燈草滋腎丸黃柏知母甜肉桂用豬脊髓和為丸怔忡眩暈厥冷江橋鎮金思榮失血之後時有怔忡甚則眩暈聞人聲則驚恐而悸四肢厥冷小腹微滿此係咯血後恐怖傷其神志細審六脈虛軟帶急心腎不足氣血不充明有驗矣其咳嗆無定者亦因君相之火上炎爍肺故寧靜則嗽亦稍安惱怒則驚恐怔忡更甚當以上下分治擬血肉有情之品填補虛處不致釀成損症河車膠元武膠真阿膠大熟地芡實肉建蓮肉云茯神淡秋石懷山藥共為末豬脊筋蒸熟和丸參鬚湯送下晚服丸方參鬚人參白茯神為末搗蜜丸米飲湯送下脾腎並虧偏枯眩暈錢思贊下虛上實眩暈不時細審六脈尺部浮大兩關歇止此營衛之氣不充脾腎之陽並虧偏枯之象已兆幸調攝得宜鎮之以靜一切有情早已鏡花雖類不仁之象猶可斡旋造化當以河車大造丸填補肝腎之不足晚進白兔丸以扶中氣之不足氣血充滿乾健轉旋何慮不收之桑榆耶大河車熟地山藥茯苓枸杞湖丹皮杜仲歸身白芍補骨鹿角霜為末煉蜜為丸白菟丸於術菟絲共為末為丸米湯送下咳嗽小便不利川沙陸兆麟令侄年十五患久嗽小便不利余診其兩寸細數此乃上焦肺熱金不生水之故瓜蔞子紫菀麥冬元參甘草加枇杷葉一劑小便如注入水小便不利一許姓者因冬月跌入水中得小便不通狂叫不絶脈沉鬱不起此為寒阻膀胱氣滯下焦所致冬瓜子柴胡梢蟋蟀干小木通煎湯服之即大通而愈嘔吐泄瀉反胃嘉平定葛子美飲食不能消化每下午食後非泄瀉即吐嘔按六脈虛軟無神此久郁不舒木鬱土中以致火土兩虛厥陽厥陰沖逆無定下乘脾土則泄瀉上衝清道則嘔吐胃虛而失納化之職故飲食難化而作脹經云清陽下陷則生飧泄濁陰在上則生䐜脹當以連理湯胃肝合法三白七味丸火土並補自然正氣旺而沖逆定火土合而諸症悉愈也廣陳皮法半夏雲茯苓白朮炭奎白芍生砂仁姜川連上肉桂三白七味丸大熟地湖丹皮山萸肉雲茯苓福澤瀉白朮炭炒白芍上肉桂久嗽聲啞王裕舟患久嗽聲啞六脈細數咳嗆多痰此肺腎兩虧金不生水以致陰虛陽亢咽中作痛水沸成痰時壅涎沫急當寧肺保金滋補腎水以冀金水相生不致有氣喘不得歸原之慮北沙參生苡仁嫩百部雲茯苓提麥冬炙紫菀款冬花生桑皮焦蔞皮炙甘草丸方六味內加龜鹿二膠産後恍惚發狂顛厥槎溪姚孟川夫人素有痰厥症春間産後正虛邪湊痰涎乘虛而入於心胞肝絡之間時多恍惚神亂醫者日進養補氣血之劑議以正虛神亂之說服月餘後即發厥狂亂棄衣而走罵詈不避親疏日夜狂叫者月餘矣按其六脈皆洪滑脈經云顛症而得陽脈者易治進以豁痰清火之劑而神亂稍安略知人事但為補藥凝結經絡肌肉麻木不知痛癢此痰涎之糾結非大進豁痰清火痰何由得解羚角尖摩沖四分廣橘紅一錢五分枳實炭一錢五分明天麻煨八分純鉤藤後下五錢法半夏一錢五分真川連四分陳膽星一錢天竺黃研三錢制姜蠶一錢五分瓜蔞霜炒四錢赤茯神三錢加竹油沖三匙薑汁一匙漂青黛包一錢五分石菖蒲一錢夾痰類傷寒童秀三向有痰飲內伏今因偶觸時邪濁痰併發以致昏迷不省狂走譫語此夾痰類傷寒之症刻下符先生疏解時邪熱退身涼獨內伏之痰飲與流注於心胸間之痰飲尚未清楚所以時清時濁治宜豁痰清火不致釀成陰癲之疾廣橘紅陳膽星炒姜蠶瓜蔞仁川鬱金金沸草法半夏純鉤藤京川貝炒竹茹蛤殼粉海浮石引石菖蒲黑山梔枳實炭後因大便不通前方加郁李仁何首烏痛痹閔姓者患手足麻腫周身疼痛食入即吐六脈沉細此即內經所謂風濕客於肝淫於脾溜於四末而為痛痹也當以驅風散濕養血舒筋為要左秦艽防風黃柏當歸靈仙漢防己木通川斷萆薢甘草加桑枝木瓜淮膝木旺脾衰納食不化一人高年木旺土虛納穀不化此火不生土乾健失職所致擬以火土相生之法吉林須茯苓白芍冬朮枳實益智仁法夏陳皮炮姜楂肉菟絲餅丸方用金匱腎氣丸挾虛感冒時邪太蒼周徐信卿挾虛感冒過經二十日不解神昏譫語齒燥舌乾飲食與則食不與則不思按其六脈微數乃為病久元虛寒邪易於出入蘊伏陽明不循表解以致熱久傷津肝風暗動之象暫擬養正托邪益陰一法別直參另燉沖八分黑元參二錢廣陳皮一錢五分炒山梔三錢真川連四分提麥冬去心二錢羚角尖摩沖四分香青蒿三錢懷生地四錢肥知母去毛鹽水炒一錢五分當歸身二錢朱云神三錢加烏犀尖摩沖四分料豆衣三錢生石決四錢脾虛挾濕命門火衰提臺林夫人脈系六陽所以精神矍鑠但左關尺二部微帶虛軟此係少陰火衰脾受濕侵理宜八味丸治之所謂欲暖脾胃之陽必先溫補命門之火也大熟地淮藥雲苓萸肉澤瀉熟附子肉桂湖丹鹿茸砂仁共為細末煉蜜為丸人參湯送下久郁傷肝吐瘀下瀉太倉張文蘭夫人久郁傷肝胸隔作楚積瘀大吐並下瀉所謂陽絡傷則血外溢陰絡傷則血內溢也細按六脈左三部沉鬱右手芤濡雖脈症合符然血脫者補氣亡陰者補陽真人參麥冬熟地丹參棗仁云茯神甘草藕節琥珀三七人中白血餘炭茅根身熱嘔吐緑水心疼胡金朝夫人據述於三月初二患身熱噁心心中疼熱氣上衝胸等症諸醫因循誤治延至草五清晨嘔出緑水半杯身熱如蒸細審六脈浮大而軟舌胎白滑口不作渴但欲寐仲景云厥陰之為病氣上撞心心中疼痛少陰之為病但欲寐就是症而論此厥陰少陰兩經之症無疑況舌胎白滑厥陰之表邪未解擬四逆散合梔豉湯以掣散其表邪無變遷為妙其清緑之水從膽經所來以使其不復吐恐傳入肝經則難為力矣軟柴胡豬膽汁炒七分枳實七分炒白芍二錢山梔吳萸七粒泡湯炒三錢料豆焙二錢加童便半杯沖服産後少腹脹滿陰㿗不收陸照明夫人産後四五日即患少腹脹滿陰㿗不收醫者以補中益氣湯一劑陰㿗即收而腹脹更甚惡露不通氣急而喘按六脈弦緊有力此産中努力太早更又中寒以致惡血當下不下流注經絡釀成血分水分之候擬以調經散於下當歸身丹參淮膝肉桂琥珀川鬱金炮姜沒藥茺蔚砂仁胸膈作痛山西吳姓者患胸隔作痛已歷多年細按六脈左三部沉鬱不舒右手脈弦緊而大此肝氣抑鬱木乘脾土當以疏肝理氣扶土製水則肝脾利而痛自愈矣瓜蔞皮炒四錢法夏一錢五分炒白芍二錢新會一錢五分烏藥一錢五分制香附三錢甘草四分茯苓三錢薤白白酒瘧痞成臌一人瘧疾成痞已及三載矣諸醫歷治病勢日增以致胸腹脹大有似痞散成臌之象此表邪溜入於少陽半表半裡經絡之間以致氣阻血滯陰陽混淆於中焦醫者不治其本妄治其標致病勢日增當以瀉心湯加減自然氣血宣通而痞可散矣法半夏川連炮姜黃芩炙甘草真人參枳實大棗歸全白芍軟柴胡青皮鬱金咯吐血痰真儒桂姓者過飲醇醪濕熱傷於肺胃之絡以致火載血溢吐咯紅痰宜戒辛熱厚味火酒等物佐以滋養真陰之劑黑元參百部知母山梔湖丹冬瓜子小薊枳椇子穭豆衣茅根關格閉結一人積勞思慮惱怒鬱結誤服香燥之劑以致津液枯槁穀食不運大便燥結此闌門氣化不宣致成關格之候擬柏子仁加減以冀旋轉為妙柏子仁松子仁沉香當歸廣皮郁李仁枳實法夏加人乳半杯沖服氣喘脹滿兩足浮腫塘西何姓者患病經年歷治不效六脈弦緊潮熱不止氣促而喘兩足浮腫漸至胸膈脹滿飲食不入左脅有筋掣痛引肩立則稍舒坐臥痛甚此濕熱淫於肝溜於脾下流於足上蒸於肺故先腫於下後腫於上氣道壅塞遂成脹滿經云肺脹者煩滿而喘肝脹者脅下痛滿而痛引經絡脾脹者飲食不得下當以氣隊宣通不致瘡瘍濕火之慮生苡仁木瓜茯苓通草廣皮建澤瀉法夏藿梗香茹沉香生薑衣荷葉食噎不下胸脅刺痛常熟朱姓者患食噎不下兩脅及胸腹不時刺痛時吐白沫此思慮鬱結氣鬱成火致令血液衰耗胃脘枯槁津液為痰而不生血痰火固結妨礙道路所以食入即噎柏子仁法夏新會金斛杏仁旋覆花枳實杏仁川貝遠志郁李仁蔗汁茅根産後蓐勞咳嗆青浦一婦妊娠六月患泄瀉歷治不效至産後尚未愈今據述産後已兩月餘矣診得六脈微細如絲咳嗆寒熱自汗盜汗飲食不進形神倦怠氣短痰壅又云因諸藥雜投病勢日增此係氣血兩虧肝脾肺大虧之症也誤藥則正氣日傷邪氣日深釀成蓐勞之候勢甚危重誠非旦夕可能奏效當先疏肝保肺之品治其諸症以參乳丸補其脾肺候諸症稍減再商調補北沙參橘紅苡仁川貝金斛人中白麥冬湖丹青蒿草節銀柴胡懷藥丸方人參乳粉云神共末為丸清晨蓮肉湯下積瘀成痞復診六脈芤滑兩脅下高硬而痛此積痰蓄瘀停阻經絡不得宣痛致成痞滿之候廣陳皮香附枳殼丹參鬱金五靈脂延胡琥珀瓦楞久痢足冷痢久方愈元氣未復繞臍時有動氣兩足不時逆冷此肝脾大虛之候白朮炭茯苓廣皮法夏人參破故紙菟絲炙草砂仁濕熱滯下成痢真儒王姓者泛舟夜遊因而受寒即患滯下之症半載有餘百藥不效脈象細軟而濡腹痛食減此係過飲醇醪厚味濕熱積於腸胃之間遇寒氣內蘊干觸穢濁以致濕蒸熱瘀氣滯於內致成痢下之症內經所謂飲食不節起居不時陽受之則入腸胃而成滯下也當以輕清升陽淡味滲濕俾清陽得升濁陰得降諸病自愈然下痢腹痛者乃肺金之氣鬱於大腸若非參蘆之提則痢性止而腹痛仍在但飲食須淡泊以養正戒厚味以逐邪則腸胃得以清理諸症可以全愈也青防風桔梗茯苓參蘆藿梗生苡仁廣皮葛根荷蒂後去葛根加豬苓澤瀉車前欲後受寒腹痛厄忒一湖洲客人欲後受寒左右寸關尺脈歇止繞臍作痛舌胎滑白擬用溫理下焦一法當歸身吳萸小茴砂仁橘核綿花仁外用雞子炙越日腹痛止而厄即前方去當歸加半夏沉香柿蒂刀豆子生薑又日厄止前方去刀豆子沉香柿蒂加炒黑枸杞內傷伏暑厥逆程云可內傷伏暑厥逆自汗服人參白虎湯後汗斂厥回獨小便赤色如朱連進參連二劑轉為深黃色顯系蘊伏之邪得解最為吉兆刻下嘔惡口苦胸脅煩滿此樞機將出轉少陽之象擬以人參半夏湯加減自然寒熱嘔惡得愈矣真人參川連姜炒廣皮法夏鉤藤生首烏李仁藿梗枇杷葉竹茹時邪泄瀉蟲痛時邪之後蟲病復作此元氣素虧外邪侵染陰分愈虛因有肝木乘脾之候其泄瀉不止時結時瀉又解柳葉蟲數次此為蟲症之瀉亦脾虛土濕物腐蠹生當以健脾清肝升降得職自然正旺邪除諸虛悉愈矣青防風桔梗白蒺雲苓白芍嫩蕪荑乾葛人參烏梅棐子肉丸方於術炭牡蠣生耆白芍鱉甲白茯苓蕪荑香附烏梅刺蒺使君肉金斛防風桑葉木瓜上藥共為末米飲搗和為丸時邪癍疹一人時邪過經不解舌乾齒燥神昏譫語斑疹未化六脈細軟無倫此熱邪傳入手少陰姑擬導赤瀉心以圖僥幸為福川黃連黃芩生地知母元參提麥冬山梔木通犀角臨經腹痛何姓婦臨經腹痛盜汗不寐兩足畏冷此血虛火亢氣不調達之故擬四物湯加減茺蔚子烏藥首烏歸全白芍制香附丹參湖丹枸杞艾絨胸腹脹滿小便尿血一房姓婦年過古稀患胸腹脹滿按之石硬而痛上則不能飲食下則小便尿血按其六脈弦緊而硬此高年氣血兩虛土衰木旺以致肝脾之血不能統藏下滲胞中所以小便尿血中焦失健運之職升降失權食少腹痛所由來也擬左金合和中扶脾之品俾得肝脾之氣稍和自然諸證亦退不然恐正虛邪實病深藥淺也真川連吳萸湯拌炒奎白芍肉桂泡湯拌炒生苡仁赤茯苓梗通草廣陳皮廣藿梗大小薊川鬱金焦蔞仁加砂仁淨石葦外腎頑痹如石一房姓者患外腎堅硬如石頑痹不仁脹滿不順此肝腎不足陰寒凝滯成為木腎之候當以溫散逐邪則自愈矣綿花仁川楝吳萸巴戟熟地葫蘆巴山楂橘核白芍破故小産發斑何姓婦外感症四五日即小産發斑目合兩手抽掣神昏不語口噤不開六脈參差此表邪陷入陰經病勢危重用古拜散合四物湯以圖僥幸荊芥炭豆豉當歸白芍熟地紫丹參澤蘭羚角鬱金地龍一條加回生丹乙丸化沖鉤藤益母全痿躄脊骨凸起平湖徐戟若令嬡十二歲時忽患背脊骨凸起並右腿骱骨亦高起傴僂不能任地脈細小無力此得之風寒入於少陰腎臟並脈絡之間用麻黃附子細辛湯加桂枝乾薑薑棗服之用外敷乳香沒藥川烏草烏陳酒藥南星薑汁蔥汁調和作餅烘熱扎患處數日後平復如常今春受病復起比前更甚不能坐立延余調治豫曰從前曾擬服補腎壯筋丸頻服以補其損處因痊愈之速尚未合服致有今日之復耳擬建中湯服數劑後即能行走仍用藥餅貼患處並服鹿角霜丸鹿角霜鹿茸龜板黃柏枸杞大熟地山藥虎脛杜仲牛膝上藥共末以豬脊髓蒸熟搗和為丸吐血咳嗽氣喘又方平湖高礪山令嬡春間忽吐血兩口延醫診視即以薑桂蓬朮山稜澤蘭青皮木香等劑後繼以丸亦用辛熱峻攻服至四五月肌肉盡脫飲食不進眩暈不能坐臥咳嗽氣喘自汗盜汗周身作痛延余診視時端節後六脈沉伏重按細數細述病情余曰今歲厥陰司天木氣不足易於耳鳴眩暈即吐血一二口服疏肝之劑使木得條達則愈矣反以辛熱峻攻使肝鬱不舒辛熱傷筋故周身作痛如刺山稜蓬朮澤蘭木香此峻攻之劑服之已久中氣大傷夫肝脾兩傷自然肌肉消脫飲食不進胃津已涸水精不能四布致火炎爍金咳嗽氣喘擬清金保肺佐以疏肝之品進之北沙參苡仁茯神金斛麥冬根生地百合骨皮湖丹青蒿京川貝鉤藤青黛冬瓜子鳳凰衣服四劑前藥盡去咳嗽猶未安寧余因思向日之病皆由前醫者誤投辛熱峻攻斫削元氣已盡精血為彼燒枯今得舒轉如久旱之得雨枯苗復生矣咳嗽不寧者此腎水枯涸水虧火亢金不能生水耳因擬寧肺保金湯清晨服以保其肺氣氣旺灌溉四布不受肺熱焦枯之患矣北沙參麥冬川貝苡仁茯神川石斛百合紫菀款冬青蒿再擬二地二冬湯晚服以滋其腎水水足則龍火自潛不致飛騰爍金耳根生地熟地天冬麥冬骨皮湖丹皮茯神元參知母青鉛如是二方服數日咳嗽亦寧已能進飲食矣一日忽寒熱往來咳嗽不寧按脈仍數余曰此惱怒傷肝所致以黑逍遙散服一劑而諸恙霍然但肌肉枯竭神氣若脫病雖稍去豈能畢其無恙耳因再四斟酌擬以瓊玉膏脾腎兩補大熟地人參白蜜天冬麥冬云茯神枸杞琥珀沉香風寒傷肺痰喘高景山令郎感冒受寒氣喘而促夜不得寐諸藥不效延豫診視六脈弦緊而滑余曰此得之寒傷肺風熱鬱於肺家擬以一劑而安明目加熟半夏橘紅嘔出痰涎碗許後以二陳湯調理而痊擬五拗湯加減細麻黃生石膏光杏仁干茶葉炙甘草粉前胡熟蘇子桑白皮痰喘病松江陸南卿令郎幼年即患痰症數載始痊至二十二歲復起每年四五次又經六載矣今春四月間連發數次每發必於子時的以半月為期發則氣喘而促日夜不得臥二三日後吐出痰涎數碗胸隔稍得舒細按六脈沉滑而大左手尤甚此肝家郁痰阻塞經絡積久成窠所以得吐則窠空而安積久則窠滿而發治必拔去其病根非順氣化痰之所能愈矣黑山梔淡豉橘紅法夏蔞霜制姜蠶浮石沉香杏仁前胡丸方化橘紅法夏姜蠶枳實蒺藜真川連瓦楞白礬川鬱金豆卷風化硝上藥共為末以薑汁竹瀝菖蒲汁萊蔔汁泛為丸晚間臥服時開水送下産後大小便不禁厥冒自汗兩足搖動南翔姚孟川夫人向有痰症在童年驚風后起歷年諸醫皆以消痰滾痰丸煎服後因産後仍服豁痰清火至春忽患大便一日夜草次小便七十餘次不時厥冒自汗臥床不起兩足不住動搖諸醫皆不識仍進消痰清火之劑曰怪症皆屬痰火況有痰證者乎而病家亦信以為然服藥後神氣欲脫氣喘不絶自汗厥逆不止諸醫皆束手而去延豫診視六脈浮空重按無神豫曰此症連服消痰已傷肝脾心三臟三陽之氣欲脫下氣上厥氣血兩傷之候夫肺主氣主衛主敷布今氣分受傷故自汗大腸傳送失職故大便草次況膀胱為太陽之根底今衛氣不能下行膀胱司化失職故小便頻數心主血主營主舒轉今血分受傷故厥冒不止兩足動搖者肝主筋血傷則急經云陽明主潤宗筋宗筋者主束骨而利機關者也今久服滾痰丸又兼産後氣血兩憊中氣大損急宜扶陽補血遂擬六君子湯加減晚以歸脾湯兼服如是十日而諸恙悉平白朮炭人參茯苓甘草法夏廣陳皮木香附子枸杞益智煨姜歸脾湯方白朮炭人參茯神棗仁龍眼炙綿耆歸身遠志木香炙草咳嗽氣喘喉痹吐紅程南珍腎勞吐紅精血枯竭已有多年不知靜養調攝復加斫削以致諸虛蜂起證曰危篤於六月中細按六脈數而無倫干嗆氣喘虛炎喉痹穀氣不納督脈痿憊皆由日久病深水虧火亢自上傳下損症盡見勢若勞瘵難以治療再四圖之惟作三焦分治庶可挽回一月以來諸恙皆退飲食漸進但六脈虛軟兩尺無根若非峻補何能填實下焦虛損且腎為人之命蒂蒂固則腎水足而龍火潛可免飛越奔騰之患今先擬補天益陰丸以補其腎緩商補脾保肺之方三焦分治自然陽生陰長寒谷春回矣但是症必須時時調攝謹慎養身絶欲三年方許收之桑榆非徒藉草根藥餌為保命之常法也紫河車漂淨挑去血筋血餘膏二兩元武膠二兩淡秋石二兩根生地四兩大熟地四兩白茯苓三兩懷山藥四兩山萸肉四兩福澤瀉三兩湖丹皮三兩淮牛膝三兩上為末煉為蜜丸每晨建蓮湯送下五錢經阻靳道臺令嬡氣惱經阻誤以怯治豫與逍遙散歸脾湯而愈天癸四月不止服加味逍遙散客病盡去刻下六脈虛軟肝脾虧損衝任帶三經不足以致血少經滯經云心主血肝藏血脾統血若心肝脾三經受損則精血不能灌溉營衛之氣不能調達則血少而經閉薛立齊云肝脾和而經自通經又云太衝脈盛月事以時下今五臟之氣受虧衝任之脈不足血枯經閉之症已兆不可不慎擬以歸脾丸加補衝任之品調攝自然肝脾之氣調達不行經而天癸自至矣若此時而用破血通經之劑則衝任益損不惟無益反增其病矣服後果經通而愈於術炭當歸人參黃耆甘草酸棗仁遠志生地茯神杜仲制香附續斷丹參懷膝胸腹絞痛痞塞嘔惡王景山惱怒傷肝思慮傷脾肝脾鬱結清濁抑遏以致中氣受傷升降失職痰涎壅滯胸隔攻刺蔓延幾載病勢日增歷來常服辛溫之品繼以參耆愈動愈滯今夏初按脈沉鬱而有力胸腹絞痛痞塞嘔惡肝乘脾土穀氣不納投以疏肝解鬱之劑諸恙皆去病勢漸緩而胸中嘈雜尚有未盡乃病久藥淺肝脾素虧之故再擬調肝和脾之藥使其肝木自舒中氣自開清濁得分升降無礙自然漸愈但七情之病必須涵養性情暢懷胸次方得全美非徒藉草根藥石為常法也擬逍遙散加減粉歸身白芍雲苓山梔川貝湖丹皮川郁柴胡香附甘草制於術鉤藤二兩荷蒂七枚共為末煎湯泛丸開水送下痿症嶽頤山本屬痿症醫者誤作大麻瘋治之經云諸虛損症一損損於肺毛焦發落二損損於肝血木脈榮三損損於胃納穀不運肌膚脹滿今頤兄尊恙即此症也往往不察病機從麻瘋之症投以燥濕祛風以致精枯而竭病勢日增此係陰陽虧損水火不濟不能水精四布遊溢精氣氣血兩憊升降失職為今不治將來諸症蜂起莫之能遏惟一切諸事但作影花水月靜養調攝繼以藥餌庶幾有合乎是症擬方於下真人參於術茯苓當歸棗仁遠志肉生地丹皮秋石白芍提麥冬甘草頭痛眩暈倒僕王建中夫人六脈弦緊不時頭痛坐臥眩暈此肝風內煽也經云諸風掉眩皆屬於肝擬以鉤藤羚羊角湯疏其肝風自然獲愈羚羊角山梔赤苓元參麥冬生白芍川貝鉤藤甘草荷蒂人中白丸提麥冬鉤藤赤苓山梔川貝人中白生地生白芍元參甘菊共為細末用金石斛湯泛丸肝鬱嘔吐宋姓者患嘔吐每於飲食後胸腹及兩脅脹滿而痛或旬日一發或月餘一發審其六脈沉弦而緊此鬱症也由思慮鬱結所致上肉桂川連石決法夏雲苓新會皮沉香烏梅川郁丸方蒸茅朮神麯法夏烏梅香附新會皮生芍撫芎山梔薑汁炒蔞皮用薤白頭煎湯泛丸血脫楊南岡血脫之後六脈弦緊胸隔填悶不快此肝脾氣結當以血脫補氣亡陽補陰為要制於術人參黃耆歸身阿膠酸棗仁遠志川斷河車五味金石斛上藥煎膏每晨人參湯化服脾虛腫滿川沙陸子梅脾陽不振命門火衰以致水溢泛濫周身浮腫痰涎壅盛外腎與尿管俱腫蓋中虛則津液化痰水虧則膀胱失化更兼惱怒素多肝木乘土諸虛蜂起細審六脈虛中帶弦今先擬五苓散以通調水道兼服米仁湯淡滲之劑互服候其脾腎之氣得旺腫滿之勢漸消然後再進金匱腎氣丸以冀收功於術炭澤瀉豬苓雲苓砂仁上肉桂沉香腹皮姜衣椒目陳麥柴人參午後煎方生米仁雲苓會皮法夏通草赤茯苓沉香桑皮姜皮吳萸金沸草木瓜加熟砂仁末服藥後目腫勢減半腎管俱收惟大便潤而澀口渴唇燥舌上白膩生苡仁茯苓會皮法夏通草冬瓜子桑皮沉香郁李川貝生薑衣參湯沖服服藥二十日後腫勢大減飲食漸進復因惱怒下利純清水六脈弦細擬用健中一法制於術廣皮法夏茯苓白芍真人參加熟砂仁末接服金匱腎氣丸方大熟地肉桂懷膝附子山藥大福澤車前萸肉茯苓丹皮肝氣頭痛厥陽時冒橫沔秦介年如夫人久患瘰癧肝氣糾結不舒厥陽上亢巔頂以致頭疼耳聾目盲左鼻作痛右鼻出血涕並下體冰冷左半身似麻痹不知痛癢此下氣上逆肝風不得降於九地之下乘土乘金縱橫無定所喜六脈未數天癸如期陰分未涸急宜平肝培土挹癸注水厥陽自斂肝風自熄矣旋覆花赭石橘紅法夏人參郁李仁黃連旱蓮草吳萸山梔料豆衣赤神晚服方真川連知母生地肉桂茯苓湖丹皮山藥萸肉龜板磁石人中白共法制為末用豬脊髓和丸指腫風症一某夏間早起必於冷水中洗手遂患左大指腫脹而痛繼以左中指亦然熏洗針灸歷治不效日久十指俱浮腫時出黃水此係寒濕傷於厥陰陽明若再連延恐成足指俱腫矣擬藥酒方治之生綿耆漢防己川萆薢晚蠶沙川桂枝嫩桑枝白歸身刺蒺藜制豨蘞宣木瓜片薑黃青防風用女貞酒一罈入前藥隔水煮一炷香隨時溫服時瘧神昏譫語鹽官陳上林夫人時瘧之後胸膈微痛夜不得寐神昏譫語細切六脈左三部沉鬱右三部弦硬此土虛木旺之故擬溫膽湯合左金丸之意則神自安而痛自緩矣真人參云神棗仁廣皮半夏淡吳萸川連用粳米煎湯代水復診飲食之後心中嘈雜此即厥陰氣上撞心心中疼痛飢不欲食擬用甲己化土肝脾同治真人參白芍吳萸泡淡同拌炒於術廣皮法夏炙甘草頭面浮腫小便赤濁太倉凌思敬六脈兩關獨大水溢渾濁頭面與足浮腫此中虛壅滯濕熱下滲膀胱以致小便赤濁宜清熱補氣諸恙自愈吉林參鬚紫菀雲苓山梔通草料豆衣知母萆薢加白果肉搗沖服五枚
